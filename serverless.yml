service: mmt
frameworkVersion: '3'
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  versionFunctions: false
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  endpointType: PRIVATE
  environment:
    COLLECTION_TEMPLATES_BUCKET_NAME: ${self:custom.collectionTemplatesBucketName}
    COLLECTION_PROPOSALS_BUCKET_NAME: ${self:custom.collectionProposalsBucketName}
    EDL_PASSWORD: ${env:EDL_PASSWORD, ''}
    COOKIE_DOMAIN: ${env:COOKIE_DOMAIN, '.localhost'}
    JWT_SECRET: ${env:JWT_SECRET, 'local-secret'}
    JWT_VALID_TIME: ${env:JWT_VALID_TIME, '900'}
    GTM_PROPERTY_ID: ${env:GTM_PROPERTY_ID, ''}
  vpc:
    securityGroupIds:
      - Fn::ImportValue: ${self:provider.stage}-LambdaSecurityGroup
    subnetIds:
      - ${env:SUBNET_ID_A, 'subnetIdA'}
      - ${env:SUBNET_ID_B, 'subnetIdB'}
      - ${env:SUBNET_ID_C, 'subnetIdC'}

  deploymentBucket:
    skipPolicySetup: true

package:
  individually: true

configValidationMode: error

functions: ${file(./serverless-configs/${self:provider.name}-functions.yml)}

resources: ${file(./serverless-configs/${self:provider.name}-resources.yml)}

plugins:
  - serverless-esbuild
  - serverless-finch
  - serverless-s3-local
  - serverless-offline

custom:
  siteName: mmt-${self:provider.stage}
  collectionTemplatesBucketName: ${self:custom.siteName}-collection-templates
  collectionProposalsBucketName: ${self:custom.siteName}-collection-proposals

  infrastructureStackName: mmt-infrastructure-${self:provider.stage}

  client:
    bucketName: ${self:custom.siteName}
    distributionFolder: dist
    objectHeaders:
      index.html:
        - name: Cache-Control
          value: no-store
      '*.css':
        - name: Cache-Control
          value: 'max-age=31536000'
      '*.js':
        - name: Cache-Control
          value: 'max-age=31536000'
      assets/:
        - name: Cache-Control
          value: 'max-age=31536000'
    manageResources: false

  serverless-offline:
    httpPort: 4001
    lambdaPort: 4003
    allowCache: true

  s3:
    host: localhost
    directory: .s3-local
    buckets:
      - ${self:custom.collectionProposalsBucketName}

  minifyBuild:
    dev: false
    sit: true
    uat: true
    prod: true

  esbuild:
    bundle: true
    minify: ${self:custom.minifyBuild.${self:provider.stage}}

